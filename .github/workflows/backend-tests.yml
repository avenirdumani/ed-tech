name: Backend Tests

on:
  push:
    branches: ["main"]
    paths:
      - "backend/**"
jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ed-tech-db
        ports:
          - 5432:5432

    env:
      DB_URL: postgresql://postgres:postgres@localhost:5432/ed-tech-db
      SECRET_KEY: dummy-secret-key-for-ci

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest --cov=src tests/ -s
